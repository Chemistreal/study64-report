<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 공부유형 64 V2 · 종합해설</title>
<style>
:root{--bg0:#040612;--bg1:#08162b;--mint:#77ffd6;--cyan:#63f7ff;--soft:#e7eeff;--muted:#a9b5d6;--line:rgba(255,255,255,.18)}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Apple SD Gothic Neo,Noto Sans KR,system-ui,sans-serif;color:var(--soft);background:radial-gradient(circle at 20% 10%,rgba(99,247,255,.18),transparent 30%),linear-gradient(135deg,var(--bg0),var(--bg1))}.loader{width:min(720px,calc(100% - 32px));padding:34px;border:1px solid var(--line);border-radius:28px;background:rgba(255,255,255,.08);box-shadow:0 30px 90px rgba(0,0,0,.42);backdrop-filter:blur(18px)}.loader b{display:block;color:var(--mint);font-size:13px;letter-spacing:.08em;margin-bottom:12px}.loader h1{font-size:clamp(30px,6vw,54px);line-height:1.06;margin:0 0 12px;letter-spacing:-.065em}.loader p{color:var(--muted);font-size:15px;line-height:1.7;margin:0}.bar{height:11px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden;margin-top:22px}.fill{width:35%;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--mint),var(--cyan));animation:move 1.2s ease-in-out infinite alternate}@keyframes move{to{transform:translateX(185%);width:45%}}
</style>
</head>
<body>
<div class="loader"><b>STUDY64 V2</b><h1>종합해설 버전을 불러오는 중입니다.</h1><p>결과 화면의 위쪽 내용과 아래쪽 내용을 하나의 긴 해설로 통합합니다.</p><div class="bar"><div class="fill"></div></div></div>
<script>
(async function(){
  const style='<style id="study64-v2-style">.v2Badge{display:inline-flex;margin-left:8px;padding:7px 10px;border-radius:999px;border:1px solid rgba(119,255,214,.42);background:rgba(119,255,214,.10);color:var(--mint);font-size:11px;font-weight:1000;letter-spacing:.08em;vertical-align:middle}#study64-v2-integrated{margin:22px 0 26px;padding:34px;border-radius:34px;border:1px solid rgba(119,255,214,.42);background:linear-gradient(145deg,rgba(119,255,214,.13),rgba(99,247,255,.07),rgba(255,255,255,.045));box-shadow:0 24px 86px rgba(99,247,255,.13),inset 0 1px 0 rgba(255,255,255,.13);position:relative;overflow:hidden}#study64-v2-integrated h2{font-size:clamp(34px,4.8vw,62px);line-height:1.04;letter-spacing:-.073em;margin:0 0 20px;color:var(--soft)}.v2MegaText{margin:0;padding:28px 30px;border-radius:26px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.056);color:var(--muted);font-size:16.5px;line-height:2.04;word-break:keep-all}.v2MegaText strong{color:var(--soft);font-weight:1000}.v2MegaText em{font-style:normal;color:var(--mint);font-weight:1000}#study64-v2-visual-stage{margin:24px 0 30px;padding:24px;border-radius:32px;border:1px solid rgba(255,255,255,.18);background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.04));box-shadow:0 22px 70px rgba(0,0,0,.20),inset 0 1px 0 rgba(255,255,255,.10)}#study64-v2-visual-stage .v2VisualHead{margin:0 0 16px}#study64-v2-visual-stage .v2VisualHead b{display:inline-flex;padding:7px 10px;border-radius:999px;border:1px solid rgba(119,255,214,.34);background:rgba(119,255,214,.08);color:var(--mint);font-size:12px;letter-spacing:.08em}#study64-v2-visual-stage .v2VisualHead h2{font-size:30px;letter-spacing:-.055em;margin:10px 0 6px}#study64-v2-visual-stage .v2VisualHead p{margin:0;color:var(--muted);line-height:1.65;font-size:14px}.study64-v2-hidden-old{display:none!important}.study64-v2-moved{margin-top:16px!important;margin-bottom:16px!important}.reportNav{display:none!important}@media(max-width:980px){#study64-v2-integrated{padding:22px}.v2MegaText{padding:21px;font-size:15.5px;line-height:1.94}#study64-v2-visual-stage{padding:18px}}@media print{#study64-v2-integrated,#study64-v2-visual-stage{background:#fff!important;border:1px solid #ddd!important;box-shadow:none!important;color:#111!important}.v2MegaText{background:#fff!important;border:1px solid #ddd!important;color:#333!important}}</style>';
  function patch(){
    const q=(s,r=document)=>r.querySelector(s), qa=(s,r=document)=>Array.from(r.querySelectorAll(s));
    const clean=s=>String(s||'').replace(/\s+/g,' ').replace(/챕터를 나누지 않고 읽는 통합 종합해설/g,'').replace(/하나로 읽는 단일 통합해설/g,'').replace(/단일 통합해설/g,'').trim();
    const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const report=q('.report'); if(!report||getComputedStyle(report).display==='none'||clean(report.textContent).length<80)return;
    const code=clean(q('.code',report)?.textContent)||'STUDY64';
    const name=clean(q('.name',report)?.textContent)||'학습유형 결과';
    const sig=code+'|'+name+'|'+clean(report.textContent).length;
    if(report.dataset.v2sig===sig&&q('#study64-v2-integrated',report))return;
    report.dataset.v2sig=sig;
    qa('.study64-v2-hidden-old',report).forEach(x=>x.classList.remove('study64-v2-hidden-old'));
    const oldStage=q('#study64-v2-visual-stage',report); if(oldStage){qa('.study64-v2-moved',oldStage).forEach(x=>{x.classList.remove('study64-v2-moved');report.appendChild(x)});oldStage.remove()}
    q('#study64-v2-integrated',report)?.remove();
    const pieces=[], seen=new Set();
    Array.from(report.children).forEach(child=>{
      if(child.matches('.bottomActions,.reportNav,#study64-v2-integrated,#study64-v2-visual-stage'))return;
      const c=child.cloneNode(true);
      c.querySelectorAll('button,script,style,.bottomActions,.reportNav,#study64-v2-integrated,#study64-v2-visual-stage').forEach(n=>n.remove());
      let t=clean(c.textContent);
      if(t.length<18)return;
      ['VISUAL DATA','그래프·이미지·시각 자료','PDF','인쇄하기'].forEach(w=>{t=t.replaceAll(w,'')});
      t=clean(t);
      const key=t.slice(0,140);
      if(t.length>18&&!seen.has(key)){seen.add(key);pieces.push(t)}
    });
    const intro='<strong>'+esc(name)+'</strong> 결과는 <em>'+esc(code)+'</em>라는 코드 하나만 설명하는 것이 아니라, 결과 화면 위쪽의 핵심 요약과 아래쪽의 세부 해석, 처방, 근거 문장을 모두 연결해서 읽어야 합니다.';
    const body=intro+' '+esc(pieces.join(' '));
    const integrated=document.createElement('section');
    integrated.id='study64-v2-integrated';
    integrated.innerHTML='<h2>종합해설</h2><p class="v2MegaText">'+body+'</p>';
    const anchor=q('.reportHero',report)||report.firstElementChild;
    if(anchor&&anchor.parentNode)anchor.insertAdjacentElement('afterend',integrated); else report.prepend(integrated);
    const stage=document.createElement('section');
    stage.id='study64-v2-visual-stage';
    stage.innerHTML='<div class="v2VisualHead"><b>VISUAL DATA</b><h2>그래프·이미지·시각 자료</h2><p>종합해설을 먼저 읽은 뒤 아래 자료를 보면 됩니다.</p></div>';
    integrated.insertAdjacentElement('afterend',stage);
    const visuals=[]; const vseen=new Set();
    qa('svg,canvas,img,.visualGrid,.visualCard,.card,.glass',report).forEach(el=>{
      if(el.closest('#study64-v2-integrated,#study64-v2-visual-stage'))return;
      const label=clean(el.textContent).slice(0,220);
      const isVisual=el.matches('svg,canvas,img,.visualGrid,.visualCard')||el.querySelector('svg,canvas,img')||/(그래프|시각화|레이더|분포도|도표|차트|프로파일 맵|matrix|chart|visual)/i.test(label);
      if(!isVisual)return;
      const node=el.matches('svg,canvas,img')?(el.closest('.visualCard,.card,.glass,.resultCard,.eduCard,.axisCard')||el):el;
      if(!vseen.has(node)){vseen.add(node);visuals.push(node)}
    });
    visuals.forEach(node=>{node.classList.add('study64-v2-moved');stage.appendChild(node)});
    Array.from(report.children).forEach(child=>{if(child.id==='study64-v2-integrated'||child.id==='study64-v2-visual-stage'||child.classList.contains('reportHero')||child.classList.contains('bottomActions'))return;child.classList.add('study64-v2-hidden-old')});
  }
  try{
    const res=await fetch('index.html?v2_source='+Date.now(),{cache:'no-store'});
    if(!res.ok)throw new Error('index.html fetch failed');
    let html=await res.text();
    html=html.replace(/<title>(.*?)<\/title>/i,'<title>학생 공부유형 64 V2 · 종합해설</title>');
    html=html.replace(/<\/head>/i,style+'\n</head>');
    document.open();document.write(html);document.close();
    setTimeout(patch,100);setTimeout(patch,800);setInterval(patch,1500);
    document.addEventListener('click',()=>setTimeout(patch,250),true);
    document.addEventListener('change',()=>setTimeout(patch,250),true);
  }catch(e){document.body.innerHTML='<div class="loader"><b>STUDY64 V2</b><h1>V2 로딩에 실패했습니다.</h1><p>index.html과 v2.html이 같은 경로에 있어야 합니다.</p></div>'}
})();
</script>
</body>
</html>
