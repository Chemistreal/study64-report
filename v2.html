<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 공부유형 64 V2 · 통합 종합해설</title>
<style>
:root{--bg0:#040612;--bg1:#08162b;--mint:#77ffd6;--cyan:#63f7ff;--soft:#e7eeff;--muted:#a9b5d6;--line:rgba(255,255,255,.18)}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Apple SD Gothic Neo,Noto Sans KR,system-ui,sans-serif;color:var(--soft);background:radial-gradient(circle at 20% 10%,rgba(99,247,255,.18),transparent 30%),linear-gradient(135deg,var(--bg0),var(--bg1))}.loader{width:min(720px,calc(100% - 32px));padding:34px;border:1px solid var(--line);border-radius:28px;background:rgba(255,255,255,.08);box-shadow:0 30px 90px rgba(0,0,0,.42);backdrop-filter:blur(18px)}.loader b{display:block;color:var(--mint);font-size:13px;letter-spacing:.08em;margin-bottom:12px}.loader h1{font-size:clamp(30px,6vw,54px);line-height:1.06;margin:0 0 12px;letter-spacing:-.065em}.loader p{color:var(--muted);font-size:15px;line-height:1.7;margin:0}.bar{height:11px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden;margin-top:22px}.fill{width:35%;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--mint),var(--cyan));animation:move 1.2s ease-in-out infinite alternate}@keyframes move{to{transform:translateX(185%);width:45%}}
</style>
</head>
<body>
<div class="loader"><b>STUDY64 V2</b><h1>통합 종합해설 버전을 불러오는 중입니다.</h1><p>기존 index.html의 검사 문항, 채점, 리포트 구조는 그대로 사용하고 해설 표시 방식만 V2 방식으로 재배치합니다.</p><div class="bar"><div class="fill"></div></div></div>
<script>
(async function(){
  const css = String.raw`<style id="study64-v2-style">
.v2Badge{display:inline-flex;margin-left:8px;padding:7px 10px;border-radius:999px;border:1px solid rgba(119,255,214,.42);background:rgba(119,255,214,.10);color:var(--mint);font-size:11px;font-weight:1000;letter-spacing:.08em;vertical-align:middle}
#study64-v2-integrated{margin:22px 0 24px;padding:30px;border-radius:34px;border:1px solid rgba(119,255,214,.40);background:linear-gradient(145deg,rgba(119,255,214,.13),rgba(99,247,255,.07),rgba(255,255,255,.045));box-shadow:0 24px 86px rgba(99,247,255,.13),inset 0 1px 0 rgba(255,255,255,.13);position:relative;overflow:hidden}#study64-v2-integrated:before{content:'';position:absolute;inset:-40%;background:radial-gradient(circle at 20% 20%,rgba(119,255,214,.12),transparent 34%),radial-gradient(circle at 80% 15%,rgba(255,219,125,.10),transparent 28%),radial-gradient(circle at 50% 95%,rgba(183,140,255,.10),transparent 35%);pointer-events:none}#study64-v2-integrated>*{position:relative}#study64-v2-integrated .v2Eyebrow{display:inline-flex;padding:8px 12px;border-radius:999px;border:1px solid rgba(255,219,125,.32);background:rgba(255,219,125,.08);color:var(--gold);font-size:12px;font-weight:1000;letter-spacing:.08em;margin-bottom:13px}#study64-v2-integrated h2{font-size:clamp(31px,4.8vw,58px);line-height:1.06;letter-spacing:-.073em;margin:0 0 16px;color:var(--soft)}#study64-v2-integrated h2 span{color:var(--mint);text-shadow:0 0 28px rgba(119,255,214,.34)}.v2Lead{font-size:17px;line-height:1.88;color:var(--muted);margin:0 0 18px;max-width:1060px}.v2Lead strong{color:var(--soft)}.v2Narrative{display:grid;gap:13px;margin-top:20px}.v2Narrative p{margin:0;padding:18px 19px;border-radius:22px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.055);color:var(--muted);font-size:15.5px;line-height:1.86}.v2Narrative p b{color:var(--mint)}.v2SignalRow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}.v2Signal{padding:18px;border-radius:22px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);box-shadow:inset 0 1px 0 rgba(255,255,255,.09)}.v2Signal b{display:block;color:var(--mint);font-size:12px;letter-spacing:.08em;margin-bottom:7px}.v2Signal strong{display:block;color:var(--soft);font-size:20px;line-height:1.28;letter-spacing:-.04em;margin-bottom:7px}.v2Signal span{display:block;color:var(--muted);font-size:13.5px;line-height:1.62}.v2ActionLine{margin-top:18px;padding:18px 19px;border-radius:24px;border:1px solid rgba(255,219,125,.28);background:rgba(255,219,125,.075);color:var(--gold);font-size:15px;line-height:1.75;font-weight:850}.v2ActionLine b{color:#fff0b8}
#study64-v2-visual-stage{margin:24px 0 30px;padding:24px;border-radius:32px;border:1px solid rgba(255,255,255,.18);background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.04));box-shadow:0 22px 70px rgba(0,0,0,.20),inset 0 1px 0 rgba(255,255,255,.10)}#study64-v2-visual-stage .v2VisualHead{margin:0 0 16px}#study64-v2-visual-stage .v2VisualHead b{display:inline-flex;padding:7px 10px;border-radius:999px;border:1px solid rgba(119,255,214,.34);background:rgba(119,255,214,.08);color:var(--mint);font-size:12px;letter-spacing:.08em}#study64-v2-visual-stage .v2VisualHead h2{font-size:30px;letter-spacing:-.055em;margin:10px 0 6px}#study64-v2-visual-stage .v2VisualHead p{margin:0;color:var(--muted);line-height:1.65;font-size:14px}.study64-v2-hidden-old{display:none!important}.study64-v2-moved{margin-top:16px!important;margin-bottom:16px!important}@media(max-width:980px){.v2SignalRow{grid-template-columns:1fr}#study64-v2-integrated{padding:22px}#study64-v2-visual-stage{padding:18px}}@media print{#study64-v2-integrated,#study64-v2-visual-stage{background:#fff!important;border:1px solid #ddd!important;box-shadow:none!important;color:#111!important}.v2Narrative p,.v2Signal,.v2ActionLine{background:#fff!important;border:1px solid #ddd!important;color:#333!important}}
</style>`;
  const js = String.raw`<script id="study64-v2-script">
(function(){
  const STATE={applying:false,lastSig:''};
  const text=el=>(el&&el.textContent||'').replace(/\s+/g,' ').trim();
  const esc=s=>String(s||'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  const q=(s,r=document)=>r.querySelector(s); const qa=(s,r=document)=>Array.from(r.querySelectorAll(s));
  function firstStrong(root){return text(q('strong',root))||text(q('h3',root))||text(q('h2',root));}
  function firstSpan(root){return text(q('span',root))||text(q('p',root));}
  function getCards(report){const seen=new Set();return qa('.resultCard,.eduCard,.axisCard,.commandActionCard',report).map(card=>({key:text(q('b',card)),title:firstStrong(card),desc:firstSpan(card)})).filter(x=>x.title||x.desc).filter(x=>{const k=(x.key+'|'+x.title+'|'+x.desc).slice(0,180);if(seen.has(k))return false;seen.add(k);return true;}).slice(0,6);}
  function buildIntegrated(report){
    const code=text(q('.code',report))||'STUDY64';
    const typeName=text(q('.name',report))||'학습유형 결과';
    const one=text(q('.one',report))||'응답 패턴을 바탕으로 학습 상황에서 반복될 가능성이 높은 반응 구조를 종합합니다.';
    const cards=getCards(report); const fallback=[typeName,'이해와 실행 사이의 연결 방식','피드백을 다음 행동으로 바꾸는 방식'];
    const signalSource=cards.length?cards.slice(0,3):fallback.map((x,i)=>({key:['핵심 신호','학습 반응','상담 초점'][i],title:x,desc:one}));
    const cardHtml=signalSource.map((c,i)=>`<div class="v2Signal"><b>${esc(c.key||['핵심 신호','학습 반응','상담 초점'][i])}</b><strong>${esc(c.title||fallback[i])}</strong><span>${esc(c.desc||one)}</span></div>`).join('');
    const main=signalSource[0]?.title||typeName, second=signalSource[1]?.title||fallback[1], third=signalSource[2]?.title||fallback[2];
    return `<section id="study64-v2-integrated" aria-label="V2 통합 종합해설"><div class="v2Eyebrow">STUDY64 V2 · INTEGRATED REPORT</div><h2>챕터를 나누지 않고 읽는 <span>통합 종합해설</span></h2><p class="v2Lead"><strong>${esc(typeName)}</strong> 결과는 학생을 하나의 성격표로 단정하기 위한 것이 아니라, 실제 공부 장면에서 반복되는 선택의 흐름을 한 번에 읽기 위한 종합 진단입니다. 이번 V2 해설은 강점, 약점, 감정 반응, 문제풀이 태도, 복습 지속성, 피드백 수용성을 따로 떼어 설명하지 않고 하나의 학습 작동 방식으로 묶어서 해석합니다.</p><div class="v2SignalRow">${cardHtml}</div><div class="v2Narrative"><p><b>전체 흐름.</b> ${esc(typeName)}의 핵심은 ${esc(main)}에서 출발합니다. 이 학생은 공부를 전혀 못하는 유형이라기보다, 무엇을 먼저 붙잡고 어떤 순서로 생각을 전개하느냐에 따라 결과 편차가 커질 수 있습니다. 따라서 상담에서는 단순히 열심히 하라는 말보다 첫 줄 해석, 조건 정리, 풀이 진입, 검산, 오답 재구성까지 하나의 루틴으로 연결시키는 것이 중요합니다.</p><p><b>학습 장면에서의 의미.</b> ${esc(second)}은 수업을 들을 때와 혼자 문제를 풀 때의 간극으로 나타날 수 있습니다. 설명을 들으면 이해되는 느낌이 있어도, 새 문제에서 조건을 재배열하거나 숨은 전제를 찾아야 하는 순간에는 속도가 늦어질 수 있습니다. 반대로 구조가 보이면 빠르게 안정되는 면도 있으므로, 이 학생에게 필요한 처방은 더 많은 양의 반복만이 아니라 문제를 어떤 눈으로 다시 읽을 것인가를 훈련시키는 것입니다.</p><p><b>성장 가능성.</b> ${esc(third)}은 피드백을 얼마나 행동으로 바꾸는지와 연결됩니다. 틀린 문제를 정답만 확인하고 넘어가면 같은 유형에서 다시 흔들릴 가능성이 높고, 오답 원인을 문장으로 재작성하면 빠르게 개선될 가능성이 큽니다. 즉 결과의 핵심은 현재 점수가 아니라, 학생이 자신의 사고 과정을 얼마나 구체적으로 관찰하고 수정할 수 있느냐입니다.</p><p><b>상담에서 바로 쓸 결론.</b> ${esc(code)}라는 결과 코드는 학생의 한계를 표시하는 이름이 아니라, 수업 설계의 출발점입니다. 이 학생에게는 개념 설명, 예제 풀이, 유사 문제 반복, 오답 문장화, 짧은 재테스트가 끊어지지 않고 이어져야 합니다. 부모님께는 의지가 부족하다보다 혼자 공부할 때 어떤 단계에서 멈추는지 찾아야 한다는 관점으로 설명하는 것이 더 정확합니다.</p></div><div class="v2ActionLine"><b>V2 처방 요약.</b> 오늘부터는 그래프나 세부 지표를 먼저 보지 말고, 위 종합해설을 먼저 읽은 뒤 아래 시각 자료로 근거를 확인하는 순서가 좋습니다. 해석의 순서는 전체 작동 방식 → 세부 지표 확인 → 구체적 학습 처방입니다.</div></section>`;
  }
  function makeVisualStage(){const box=document.createElement('section');box.id='study64-v2-visual-stage';box.innerHTML='<div class="v2VisualHead"><b>VISUAL DATA AFTER INTERPRETATION</b><h2>그래프·이미지·세부 지표</h2><p>종합해설을 먼저 읽은 뒤, 아래 자료를 근거 확인용으로 보도록 순서를 재배치했습니다. 기존 index.html의 시각화 요소는 삭제하지 않고 이 영역으로 모았습니다.</p></div>';return box;}
  function isVisualNode(node){if(!node||node.nodeType!==1||node.closest('#study64-v2-integrated,#study64-v2-visual-stage'))return false;const label=text(node).slice(0,320);return node.matches('.visualGrid,.visualCard')||node.querySelector('svg,canvas,img')||(node.matches('.card,.glass,.resultCard,.eduCard,.axisCard')&&/(그래프|시각화|분포|레이더|이미지|도표|차트|matrix|map)/i.test(label));}
  function collectVisuals(report){const set=new Set();qa('.visualGrid,.visualCard,svg,canvas,img,.card,.glass,.resultCard,.eduCard,.axisCard',report).forEach(el=>{let node=el;if(['svg','canvas','img'].includes(el.tagName.toLowerCase()))node=el.closest('.visualCard,.card,.glass')||el;if(isVisualNode(node))set.add(node);});return Array.from(set).filter(node=>report.contains(node));}
  function hideOldChapterBlocks(report){qa('.deepSection,.deepNarrativeBox,.interpretGrid,.behaviorMap',report).forEach(el=>{if(!el.closest('#study64-v2-integrated,#study64-v2-visual-stage')&&!el.querySelector('svg,canvas,img'))el.classList.add('study64-v2-hidden-old');});qa('.card,.glass',report).forEach(el=>{const head=text(q('h2,h3,.sectionHead',el));if(!el.closest('#study64-v2-integrated,#study64-v2-visual-stage')&&/(챕터별|세부 해설|영역별 해석|종합 해석|해설|학습 처방 해설)/.test(head)&&!el.querySelector('svg,canvas,img'))el.classList.add('study64-v2-hidden-old');});}
  function badge(){if(document.querySelector('.v2Badge'))return;const target=document.querySelector('.tag,.brand,h1');if(target){const b=document.createElement('span');b.className='v2Badge';b.textContent='V2 · 통합해설';target.appendChild(b);}}
  function apply(){const report=q('.report');if(!report)return;const visible=getComputedStyle(report).display!=='none'&&text(report).length>80;if(!visible)return;const sig=[text(q('.code',report)),text(q('.name',report)),text(q('.one',report))].join('|');if(STATE.applying||(STATE.lastSig===sig&&q('#study64-v2-integrated',report)))return;STATE.applying=true;try{STATE.lastSig=sig;qa('.study64-v2-hidden-old',report).forEach(el=>el.classList.remove('study64-v2-hidden-old'));q('#study64-v2-integrated',report)?.remove();q('#study64-v2-visual-stage',report)?.remove();const anchor=q('.reportHero',report)||report.firstElementChild;const holder=document.createElement('div');holder.innerHTML=buildIntegrated(report);const integrated=holder.firstElementChild;if(anchor&&anchor.parentNode)anchor.insertAdjacentElement('afterend',integrated);else report.prepend(integrated);const stage=makeVisualStage();integrated.insertAdjacentElement('afterend',stage);collectVisuals(report).forEach(node=>{if(node!==integrated&&node!==stage&&!node.closest('#study64-v2-integrated,#study64-v2-visual-stage')){node.classList.add('study64-v2-moved');stage.appendChild(node);}});hideOldChapterBlocks(report);}finally{STATE.applying=false;}}
  function boot(){badge();apply();document.addEventListener('click',()=>setTimeout(apply,250),true);document.addEventListener('change',()=>setTimeout(apply,250),true);new MutationObserver(()=>setTimeout(apply,120)).observe(document.body,{childList:true,subtree:true,attributes:true,attributeFilter:['style','class']});}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
})();
<\/script>`;
  try{
    const res=await fetch('index.html?v2_source='+Date.now(),{cache:'no-store'});
    if(!res.ok)throw new Error('index.html fetch failed: '+res.status);
    let html=await res.text();
    html=html.replace(/<title>(.*?)<\/title>/i,'<title>학생 공부유형 64 V2 · 통합 종합해설</title>');
    html=html.replace(/<\/head>/i,css+'\n</head>');
    html=html.replace(/<\/body>/i,js+'\n</body>');
    document.open();document.write(html);document.close();
  }catch(err){document.body.innerHTML='<div class="loader"><b>STUDY64 V2</b><h1>V2 로딩에 실패했습니다.</h1><p>index.html을 같은 경로에서 불러와야 합니다. 배포 후 v2.html과 index.html이 같은 폴더에 있는지 확인하세요.</p><p style="margin-top:12px;color:#ffdb7d">'+String(err.message).replace(/[&<>"']/g,'')+'</p></div>';}
})();
</script>
</body>
</html>
