<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 공부유형 64 V2 · 종합해설</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#040612;font-family:Apple SD Gothic Neo,Noto Sans KR,system-ui,sans-serif}
#app{width:100%;height:100%;border:0;display:block;background:#040612}
#loading{position:fixed;inset:0;display:grid;place-items:center;color:#e7eeff;background:radial-gradient(circle at 20% 10%,rgba(99,247,255,.18),transparent 30%),linear-gradient(135deg,#040612,#08162b);z-index:10}
.box{width:min(720px,calc(100% - 32px));padding:34px;border:1px solid rgba(255,255,255,.18);border-radius:28px;background:rgba(255,255,255,.08);box-shadow:0 30px 90px rgba(0,0,0,.42);backdrop-filter:blur(18px)}
.box b{display:block;color:#77ffd6;font-size:13px;letter-spacing:.08em;margin-bottom:12px}.box h1{font-size:clamp(30px,6vw,54px);line-height:1.06;margin:0 0 12px;letter-spacing:-.065em}.box p{color:#a9b5d6;font-size:15px;line-height:1.7;margin:0}.bar{height:11px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden;margin-top:22px}.fill{width:35%;height:100%;border-radius:999px;background:linear-gradient(90deg,#77ffd6,#63f7ff);animation:move 1.2s ease-in-out infinite alternate}@keyframes move{to{transform:translateX(185%);width:45%}}
</style>
</head>
<body>
<div id="loading"><div class="box"><b>STUDY64 V2</b><h1>종합해설 버전</h1><p>표·배지·점수 라벨을 제외하고 문장형 해설만 하나로 통합합니다.</p><div class="bar"><div class="fill"></div></div></div></div>
<iframe id="app" src="index.html?v2=narrative-only"></iframe>
<script>
(function(){
  var frame=document.getElementById('app');
  var loading=document.getElementById('loading');
  var timer=null;
  function clean(s){return String(s||'').replace(/\s+/g,' ').replace(/챕터를 나누지 않고 읽는 통합 종합해설/g,'').replace(/하나로 읽는 단일 통합해설/g,'').replace(/단일 통합해설/g,'').replace(/SINGLE INTEGRATED INTERPRETATION/g,'').trim();}
  function esc(s){return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function injectStyle(d){
    if(d.getElementById('study64-v2-style'))return;
    var st=d.createElement('style');
    st.id='study64-v2-style';
    st.textContent='.study64-v2-hide{display:none!important}.reportNav{display:none!important}#study64-v2-integrated{margin:22px 0 28px;padding:34px;border-radius:34px;border:1px solid rgba(119,255,214,.42);background:linear-gradient(145deg,rgba(119,255,214,.13),rgba(99,247,255,.07),rgba(255,255,255,.045));box-shadow:0 24px 86px rgba(99,247,255,.13),inset 0 1px 0 rgba(255,255,255,.13)}#study64-v2-integrated h2{font-size:clamp(34px,4.8vw,62px);line-height:1.04;letter-spacing:-.073em;margin:0 0 20px;color:var(--soft,#e7eeff)}#study64-v2-integrated .v2Text{margin:0;padding:28px 30px;border-radius:26px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.056);color:var(--muted,#a9b5d6);font-size:16.5px;line-height:2.04;word-break:keep-all;white-space:normal}#study64-v2-visuals{margin:24px 0 32px;padding:24px;border-radius:32px;border:1px solid rgba(255,255,255,.18);background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.04));box-shadow:0 22px 70px rgba(0,0,0,.20),inset 0 1px 0 rgba(255,255,255,.10)}#study64-v2-visuals h2{font-size:30px;letter-spacing:-.055em;margin:0 0 8px;color:var(--soft,#e7eeff)}#study64-v2-visuals p{margin:0 0 16px;color:var(--muted,#a9b5d6);line-height:1.65}.study64-v2-moved{margin-top:16px!important;margin-bottom:16px!important}@media(max-width:980px){#study64-v2-integrated{padding:22px}#study64-v2-integrated .v2Text{padding:21px;font-size:15.5px;line-height:1.94}#study64-v2-visuals{padding:18px}}';
    d.head.appendChild(st);
  }
  function isBadText(t){
    if(!t||t.length<18)return true;
    if(/PREMIUM|LEARNING INSIGHT|v2026|VISUAL DATA|PDF|인쇄|처음으로|다시 검사/.test(t))return true;
    if(/극상위권\s*\d+%|최상위권\s*\d+%|상위권\s*\d+%|중위권\s*\d+%|하위권\s*\d+%/.test(t))return true;
    if(/^(극상위권|최상위권|상위권|중위권|하위권|점수|백분위|신뢰도|유형|코드)$/.test(t))return true;
    var digits=(t.match(/[0-9%]/g)||[]).length;
    if(digits>0&&digits/t.length>0.28)return true;
    return false;
  }
  function extractNarrative(report){
    var selectors=['.copy p','.one','.notice','.resultCard span','.eduCard span','.axisCard span','.commandActionCard span','.summaryFirstCard span','.card p','.card li','.quad p','.day span','.humanLayerCard p','.evidenceFrame p','.claimMapCard p','.dynamicQuad p','.auditCard span','.auditRow span','.frameMini span'];
    var parts=[];var seen={};
    selectors.forEach(function(sel){
      Array.prototype.slice.call(report.querySelectorAll(sel)).forEach(function(el){
        if(el.closest('#study64-v2-integrated,#study64-v2-visuals,.reportNav,.bottomActions'))return;
        if(el.querySelector('svg,canvas,img'))return;
        var t=clean(el.textContent);
        if(isBadText(t))return;
        var key=t.slice(0,100);
        if(seen[key])return;
        seen[key]=true;parts.push(t);
      });
    });
    if(parts.length<3){
      Array.prototype.slice.call(report.querySelectorAll('p,li')).forEach(function(el){
        if(el.closest('#study64-v2-integrated,#study64-v2-visuals,.reportNav,.bottomActions'))return;
        var t=clean(el.textContent);
        if(isBadText(t))return;
        var key=t.slice(0,100);
        if(seen[key])return;
        seen[key]=true;parts.push(t);
      });
    }
    return parts.join(' ');
  }
  function visualBlocks(report){
    var out=[];var seen=[];
    Array.prototype.slice.call(report.querySelectorAll('svg,canvas,img,.visualGrid,.visualCard')).forEach(function(el){
      if(el.closest('#study64-v2-integrated,#study64-v2-visuals'))return;
      var node=el.matches('svg,canvas,img')?(el.closest('.visualCard,.card,.glass')||el):el;
      if(seen.indexOf(node)>=0)return;
      seen.push(node);out.push(node);
    });
    return out;
  }
  function patch(){
    var d;
    try{d=frame.contentDocument||frame.contentWindow.document;}catch(e){return;}
    if(!d||!d.body)return;
    injectStyle(d);
    var report=d.querySelector('.report');
    if(!report||getComputedStyle(report).display==='none'||clean(report.textContent).length<80)return;
    var text=extractNarrative(report);
    var sig=clean(text).length+'|'+clean((report.querySelector('.code')||{}).textContent);
    if(report.getAttribute('data-v2-ok')===sig)return;
    report.setAttribute('data-v2-ok',sig);
    Array.prototype.slice.call(report.querySelectorAll('.study64-v2-hide')).forEach(function(x){x.classList.remove('study64-v2-hide');});
    var old=report.querySelector('#study64-v2-integrated');if(old)old.remove();
    var oldv=report.querySelector('#study64-v2-visuals');if(oldv)oldv.remove();
    var integrated=d.createElement('section');
    integrated.id='study64-v2-integrated';
    integrated.innerHTML='<h2>종합해설</h2><p class="v2Text">'+esc(text||'결과 해설 문장을 수집하지 못했습니다. 원본 결과 화면의 해설 요소 구조를 확인해야 합니다.')+'</p>';
    var visuals=d.createElement('section');
    visuals.id='study64-v2-visuals';
    visuals.innerHTML='<h2>그래프·이미지·시각 자료</h2><p>종합해설 다음에 확인하는 보조 자료입니다.</p>';
    report.prepend(visuals);
    report.prepend(integrated);
    visualBlocks(report).forEach(function(node){node.classList.add('study64-v2-moved');visuals.appendChild(node);});
    Array.prototype.slice.call(report.children).forEach(function(child){
      if(child.id==='study64-v2-integrated'||child.id==='study64-v2-visuals')return;
      if(child.classList.contains('bottomActions'))return;
      child.classList.add('study64-v2-hide');
    });
    loading.style.display='none';
  }
  frame.addEventListener('load',function(){
    loading.style.display='none';
    if(timer)clearInterval(timer);
    timer=setInterval(patch,700);
    setTimeout(patch,200);
    setTimeout(patch,1000);
  });
})();
</script>
</body>
</html>
